name: Reusable Deployment Workflow

on:
  workflow_call:
    inputs:
      environment:
        description: 'Deployment environment (staging/production)'
        required: true
        type: string
      system_type:
        description: 'System type (magento/odoo)'
        required: true
        type: string
      app_path:
        description: 'Application path on server'
        required: true
        type: string
      ssh_host:
        description: 'SSH host'
        required: true
        type: string
      ssh_user:
        description: 'SSH user'
        required: true
        type: string
      deploy_branch:
        description: 'Branch to deploy'
        required: false
        type: string
        default: 'main'
      health_check_url:
        description: 'URL for health check after deployment'
        required: false
        type: string
    secrets:
      ssh_key:
        description: 'SSH private key'
        required: true
      composer_auth:
        description: 'Composer auth JSON (Magento only)'
        required: false

jobs:
  deploy:
    name: Deploy to ${{ inputs.environment }}
    runs-on: ubuntu-latest
    environment:
      name: ${{ inputs.environment }}
      url: ${{ inputs.health_check_url }}
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.deploy_branch }}
      
      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.ssh_key }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H ${{ inputs.ssh_host }} >> ~/.ssh/known_hosts
      
      - name: Deploy ${{ inputs.system_type }} application
        run: |
          echo "Deploying ${{ inputs.system_type }} to ${{ inputs.environment }}..."
          
          # Create deployment script based on system type
          if [ "${{ inputs.system_type }}" = "magento" ]; then
            cat > deploy.sh << 'EOF'
          #!/bin/bash
          set -eo pipefail
          
          APP_PATH="$1"
          BRANCH="$2"
          HEALTH_URL="$3"
          BACKUP_DIR="/tmp/magento_deploy_backup_$$"
          ENV_TOKEN="$(basename "$APP_PATH")"
          HEALTH_HOST="${HEALTH_URL#*://}"; HEALTH_HOST="${HEALTH_HOST%%/*}"

          cd "$APP_PATH"
          
          # Cleanup function — runs on any failure
          cleanup_on_failure() {
            local exit_code=$?
            echo ""
            echo "❌ Deployment failed at line $BASH_LINENO (exit code: $exit_code)"
            echo "🔄 Rolling back..."
          
            # Regenerate static if the version file is missing — more robust than only
            # restoring the version string, since setup:upgrade/di:compile may have wiped
            # the actual pub/static version dirs; fall back to the early backup. (MAG2-416)
            if [ ! -f pub/static/deployed_version.txt ]; then
              php bin/magento setup:static-content:deploy -f en_US 2>/dev/null || true
              if [ ! -f pub/static/deployed_version.txt ] && [ -f "$BACKUP_DIR/deployed_version.txt" ]; then
                cp "$BACKUP_DIR/deployed_version.txt" pub/static/deployed_version.txt
              fi
            fi

            # Flush cache so restored static version is recognized
            php bin/magento cache:flush 2>/dev/null || true

            # Only re-open the site if static is actually present; otherwise LEAVE maintenance
            # ON (friendly 503) for manual recovery rather than exposing a raw 500. (MAG2-416)
            if [ -f pub/static/deployed_version.txt ]; then
              php bin/magento maintenance:disable 2>/dev/null || true
              echo "🔄 Rollback complete. Site serving with restored static content."
            else
              echo "⚠️ deployed_version.txt still missing — LEAVING MAINTENANCE MODE ON; run: php bin/magento setup:static-content:deploy -f en_US"
            fi

            # MAG2-426: restore this env's crontab (re-enable cron:run) before cleanup
            [ -s "$BACKUP_DIR/crontab.bak" ] && crontab "$BACKUP_DIR/crontab.bak" 2>/dev/null || true

            # Clean up backup dir
            rm -rf "$BACKUP_DIR"
            exit $exit_code
          }
          
          trap cleanup_on_failure ERR
          
          # Create backup directory + back up deployed_version.txt EARLY, before anything
          # (setup:upgrade / di:compile / static-content) can wipe pub/static. (MAG2-416)
          mkdir -p "$BACKUP_DIR"
          if [ -f pub/static/deployed_version.txt ]; then
            cp pub/static/deployed_version.txt "$BACKUP_DIR/deployed_version.txt"
          fi

          echo "📦 Pulling latest code..."
          # NOTE: git stash is never popped — it silently stashes the server's uncommitted env
          # files (app/etc/config.php, hyva-themes.json) each deploy. Out of scope for the
          # outage fix; tracked as MAG2-416 "Deferred".
          git stash --quiet 2>/dev/null || true
          git fetch origin
          git checkout "$BRANCH"
          git pull origin "$BRANCH"
          
          echo "📦 Installing Composer dependencies..."
          composer install --no-dev --no-interaction
          
          echo "🔒 Enabling maintenance mode..."
          php bin/magento maintenance:enable
          
          # MAG2-426: stop background writers BEFORE clearing/compiling. cron:run +
          # cron_consumers_runner repopulate generated/code during di:compile's internal
          # regenerate → "rmdir … Directory not empty" + a failed/partial compile (confirmed
          # on prod run 27469722563). The atomic mv below protects only the INITIAL clear;
          # di:compile's own clear still races live writers, so the MAG2-416 "atomic mv is
          # enough, no consumer-stop" assumption was wrong. Per runbook §4 + CLAUDE.md
          # DI-graph prerequisites, stop them. The crontab is SHARED across staging+prod and
          # its only cron:run targets prod — disable ONLY this env's lines (match $ENV_TOKEN),
          # never the other env's; on staging this matches nothing (no staging cron) = no-op.
          echo "🛑 Stopping background writers for $ENV_TOKEN (MAG2-426)..."
          crontab -l > "$BACKUP_DIR/crontab.bak" 2>/dev/null || true
          if [ -s "$BACKUP_DIR/crontab.bak" ]; then
            crontab -l 2>/dev/null | sed "\|$ENV_TOKEN.*cron:run|s|^|# MAG2-426-DEPLOY-DISABLED |" | crontab - 2>/dev/null || true
          fi
          # Kill this env's in-flight cron:run + queue consumers. Separate commands; this
          # script's argv (bash /tmp/deploy.sh <app_path> ...) contains $ENV_TOKEN but NOT
          # "cron:run"/"queue:consumers:start", so no pkill self-kill. Best-effort.
          pkill -f "$ENV_TOKEN.*cron:run" 2>/dev/null || true
          pkill -f "$ENV_TOKEN.*queue:consumers:start" 2>/dev/null || true
          sleep 3   # let any in-flight on-demand class generation settle

          # Atomic generated/ swap (NOT rm -rf): the rename itself can't be raced. (MAG2-416)
          echo "🧹 Swapping generated/ atomically + clearing preprocessed templates..."
          mv generated "generated.old.$(date +%s)" 2>/dev/null || true
          mkdir -p generated/code generated/metadata
          rm -rf var/view_preprocessed/* 2>/dev/null || true

          echo "📦 Composer autoload (pre-compile, non-optimized)..."
          composer dump-autoload --no-dev

          echo "🔧 Running Magento setup upgrade..."
          php bin/magento setup:upgrade

          echo "🔧 Compiling DI..."
          php bin/magento setup:di:compile

          echo "📦 Composer autoload (optimized, after compile)..."
          composer dump-autoload --optimize --no-dev
          
          echo "🔧 Deploying static content..."
          php bin/magento setup:static-content:deploy -f en_US

          # Belt-and-suspenders: restore the early backup if static deploy produced no version file
          if [ ! -f pub/static/deployed_version.txt ] && [ -f "$BACKUP_DIR/deployed_version.txt" ]; then
            cp "$BACKUP_DIR/deployed_version.txt" pub/static/deployed_version.txt
          fi

          # Hard gate: never disable maintenance on a site with no static version. A missing
          # file here trips the ERR trap (regenerate + keep maintenance ON) instead of a 500.
          if [ ! -f pub/static/deployed_version.txt ]; then
            echo "FATAL: deployed_version.txt missing after static deploy — aborting into rollback"
            false
          fi

          echo "🧹 Flushing cache..."
          php bin/magento cache:flush

          echo "🔁 Reindexing catalogsearch_fulltext..."
          php bin/magento indexer:reindex catalogsearch_fulltext || true

          echo "🔓 Disabling maintenance mode..."
          php bin/magento maintenance:disable

          # MAG2-426: restore this env's crontab (re-enable cron:run); consumers restart on
          # the next cron tick.
          [ -s "$BACKUP_DIR/crontab.bak" ] && crontab "$BACKUP_DIR/crontab.bak" 2>/dev/null || true

          # MAG2-426: real post-deploy health check — server-side against the origin
          # (https://10.64.162.42/ with the env Host header) so it BYPASSES the Cloudflare WAF
          # that 403s the GitHub-runner curl. A non-200 here fails the deploy (→ ERR trap), so
          # a red run now means a genuinely unhealthy deploy, not the routine WAF 403.
          if [ -n "$HEALTH_HOST" ]; then
            echo "🏥 Health check (origin 10.64.162.42, Host: $HEALTH_HOST)..."
            HC_OK=0
            for attempt in 1 2 3 4 5; do
              HC=$(curl -sk -o /dev/null -w '%{http_code}' --max-time 30 -H "Host: $HEALTH_HOST" https://10.64.162.42/ 2>/dev/null || echo 000)
              if [ "$HC" = "200" ]; then echo "✅ Health check passed (HTTP 200)"; HC_OK=1; break; fi
              echo "⚠️ attempt $attempt: HTTP $HC"; sleep 10
            done
            if [ "$HC_OK" != "1" ]; then
              echo "❌ FATAL: post-deploy origin health check did not return 200 — failing deploy (MAG2-426)"
              false
            fi
          fi

          # Prune old generated backups (keep most recent 1) + clean up version backup
          ls -dt generated.old.* 2>/dev/null | tail -n +2 | xargs -r rm -rf 2>/dev/null || true
          rm -rf "$BACKUP_DIR"

          echo "✅ Deployment complete!"
          EOF
          
          elif [ "${{ inputs.system_type }}" = "odoo" ]; then
            cat > deploy.sh << 'EOF'
          #!/bin/bash
          set -e
          
          APP_PATH="$1"
          BRANCH="$2"
          
          echo "📦 Pulling latest code..."
          cd "$APP_PATH"
          git fetch origin
          git checkout "$BRANCH"
          git pull origin "$BRANCH"
          
          echo "📦 Installing Python dependencies..."
          pip3 install -r requirements.txt --user
          
          echo "🔧 Updating Odoo modules..."
          # Restart Odoo service (adjust service name as needed)
          sudo systemctl restart odoo
          
          echo "✅ Deployment complete!"
          EOF
          fi
          
          chmod +x deploy.sh
          
          # Execute deployment via SSH
          scp -o IdentitiesOnly=yes -i ~/.ssh/deploy_key deploy.sh ${{ inputs.ssh_user }}@${{ inputs.ssh_host }}:/tmp/
          ssh -o IdentitiesOnly=yes -i ~/.ssh/deploy_key ${{ inputs.ssh_user }}@${{ inputs.ssh_host }} "bash /tmp/deploy.sh ${{ inputs.app_path }} ${{ inputs.deploy_branch }} '${{ inputs.health_check_url }}'"
      
      - name: Health check (informational)
        if: inputs.health_check_url != ''
        run: |
          # MAG2-426: the REAL post-deploy health gate now runs server-side inside the deploy
          # step (origin curl with Host header, bypassing the Cloudflare WAF). This GitHub-runner
          # curl is kept for visibility only and NEVER fails the job — the WAF 403s the runner IP,
          # so a non-200 here is expected and used to mask genuine deploy failures (the bug).
          HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" --max-time 30 ${{ inputs.health_check_url }} || echo 000)
          echo "ℹ️ Public URL ${{ inputs.health_check_url }} from GH runner → HTTP $HTTP_CODE (403/000 expected: Cloudflare WAF blocks the runner; real gate is the server-side origin check in the deploy step — MAG2-426)."
      
      - name: Deployment summary
        if: always()
        run: |
          echo "### Deployment Summary 🚀" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- **System**: ${{ inputs.system_type }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Environment**: ${{ inputs.environment }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Branch**: ${{ inputs.deploy_branch }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Host**: ${{ inputs.ssh_host }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Status**: ${{ job.status }}" >> $GITHUB_STEP_SUMMARY
