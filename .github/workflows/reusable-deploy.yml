name: Reusable Deployment Workflow

on:
  workflow_call:
    inputs:
      environment:
        description: 'Deployment environment (staging/production)'
        required: true
        type: string
      system_type:
        description: 'System type (magento/odoo)'
        required: true
        type: string
      app_path:
        description: 'Application path on server'
        required: true
        type: string
      ssh_host:
        description: 'SSH host'
        required: true
        type: string
      ssh_user:
        description: 'SSH user'
        required: true
        type: string
      deploy_branch:
        description: 'Branch to deploy'
        required: false
        type: string
        default: 'main'
      health_check_url:
        description: 'URL for health check after deployment'
        required: false
        type: string
    secrets:
      ssh_key:
        description: 'SSH private key'
        required: true
      composer_auth:
        description: 'Composer auth JSON (Magento only)'
        required: false

jobs:
  deploy:
    name: Deploy to ${{ inputs.environment }}
    runs-on: ubuntu-latest
    environment:
      name: ${{ inputs.environment }}
      url: ${{ inputs.health_check_url }}
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.deploy_branch }}
      
      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.ssh_key }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H ${{ inputs.ssh_host }} >> ~/.ssh/known_hosts
      
      - name: Deploy ${{ inputs.system_type }} application
        run: |
          echo "Deploying ${{ inputs.system_type }} to ${{ inputs.environment }}..."
          
          # Create deployment script based on system type
          if [ "${{ inputs.system_type }}" = "magento" ]; then
            cat > deploy.sh << 'EOF'
          #!/bin/bash
          set -eo pipefail
          
          APP_PATH="$1"
          BRANCH="$2"
          BACKUP_DIR="/tmp/magento_deploy_backup_$$"
          
          cd "$APP_PATH"
          
          # Cleanup function — runs on any failure
          cleanup_on_failure() {
            local exit_code=$?
            echo ""
            echo "❌ Deployment failed at line $BASH_LINENO (exit code: $exit_code)"
            echo "🔄 Rolling back..."
          
            # Regenerate static if the version file is missing — more robust than only
            # restoring the version string, since setup:upgrade/di:compile may have wiped
            # the actual pub/static version dirs; fall back to the early backup. (MAG2-416)
            if [ ! -f pub/static/deployed_version.txt ]; then
              php bin/magento setup:static-content:deploy -f en_US 2>/dev/null || true
              if [ ! -f pub/static/deployed_version.txt ] && [ -f "$BACKUP_DIR/deployed_version.txt" ]; then
                cp "$BACKUP_DIR/deployed_version.txt" pub/static/deployed_version.txt
              fi
            fi

            # Flush cache so restored static version is recognized
            php bin/magento cache:flush 2>/dev/null || true

            # Only re-open the site if static is actually present; otherwise LEAVE maintenance
            # ON (friendly 503) for manual recovery rather than exposing a raw 500. (MAG2-416)
            if [ -f pub/static/deployed_version.txt ]; then
              php bin/magento maintenance:disable 2>/dev/null || true
              echo "🔄 Rollback complete. Site serving with restored static content."
            else
              echo "⚠️ deployed_version.txt still missing — LEAVING MAINTENANCE MODE ON; run: php bin/magento setup:static-content:deploy -f en_US"
            fi

            # Clean up backup dir
            rm -rf "$BACKUP_DIR"
            exit $exit_code
          }
          
          trap cleanup_on_failure ERR
          
          # Create backup directory + back up deployed_version.txt EARLY, before anything
          # (setup:upgrade / di:compile / static-content) can wipe pub/static. (MAG2-416)
          mkdir -p "$BACKUP_DIR"
          if [ -f pub/static/deployed_version.txt ]; then
            cp pub/static/deployed_version.txt "$BACKUP_DIR/deployed_version.txt"
          fi

          echo "📦 Pulling latest code..."
          # NOTE: git stash is never popped — it silently stashes the server's uncommitted env
          # files (app/etc/config.php, hyva-themes.json) each deploy. Out of scope for the
          # outage fix; tracked as MAG2-416 "Deferred".
          git stash --quiet 2>/dev/null || true
          git fetch origin
          git checkout "$BRANCH"
          git pull origin "$BRANCH"
          
          echo "📦 Installing Composer dependencies..."
          composer install --no-dev --no-interaction
          
          echo "🔒 Enabling maintenance mode..."
          php bin/magento maintenance:enable
          
          # Atomic generated/ swap (NOT rm -rf): a single rename can't be raced by on-demand
          # class generation from queue consumers / cron. Core MAG2-416 fix — the old
          # "rm -rf generated/code/*" raced with live consumers ("Directory not empty"),
          # failing mid-deploy after pub/static was already wiped -> 500. Per runbook §4,
          # atomic mv is safe even with consumers running, so no consumer-stop (avoids the
          # pkill self-kill trap + cross-user permission no-ops).
          echo "🧹 Swapping generated/ atomically + clearing preprocessed templates..."
          mv generated "generated.old.$(date +%s)" 2>/dev/null || true
          mkdir -p generated/code generated/metadata
          rm -rf var/view_preprocessed/* 2>/dev/null || true

          echo "📦 Composer autoload (pre-compile, non-optimized)..."
          composer dump-autoload --no-dev

          echo "🔧 Running Magento setup upgrade..."
          php bin/magento setup:upgrade

          echo "🔧 Compiling DI..."
          php bin/magento setup:di:compile

          echo "📦 Composer autoload (optimized, after compile)..."
          composer dump-autoload --optimize --no-dev
          
          echo "🔧 Deploying static content..."
          php bin/magento setup:static-content:deploy -f en_US

          # Belt-and-suspenders: restore the early backup if static deploy produced no version file
          if [ ! -f pub/static/deployed_version.txt ] && [ -f "$BACKUP_DIR/deployed_version.txt" ]; then
            cp "$BACKUP_DIR/deployed_version.txt" pub/static/deployed_version.txt
          fi

          # Hard gate: never disable maintenance on a site with no static version. A missing
          # file here trips the ERR trap (regenerate + keep maintenance ON) instead of a 500.
          if [ ! -f pub/static/deployed_version.txt ]; then
            echo "FATAL: deployed_version.txt missing after static deploy — aborting into rollback"
            false
          fi

          echo "🧹 Flushing cache..."
          php bin/magento cache:flush

          echo "🔁 Reindexing catalogsearch_fulltext..."
          php bin/magento indexer:reindex catalogsearch_fulltext || true

          echo "🔓 Disabling maintenance mode..."
          php bin/magento maintenance:disable

          # Prune old generated backups (keep most recent 1) + clean up version backup
          ls -dt generated.old.* 2>/dev/null | tail -n +2 | xargs -r rm -rf 2>/dev/null || true
          rm -rf "$BACKUP_DIR"
          
          echo "✅ Deployment complete!"
          EOF
          
          elif [ "${{ inputs.system_type }}" = "odoo" ]; then
            cat > deploy.sh << 'EOF'
          #!/bin/bash
          set -e
          
          APP_PATH="$1"
          BRANCH="$2"
          
          echo "📦 Pulling latest code..."
          cd "$APP_PATH"
          git fetch origin
          git checkout "$BRANCH"
          git pull origin "$BRANCH"
          
          echo "📦 Installing Python dependencies..."
          pip3 install -r requirements.txt --user
          
          echo "🔧 Updating Odoo modules..."
          # Restart Odoo service (adjust service name as needed)
          sudo systemctl restart odoo
          
          echo "✅ Deployment complete!"
          EOF
          fi
          
          chmod +x deploy.sh
          
          # Execute deployment via SSH
          scp -o IdentitiesOnly=yes -i ~/.ssh/deploy_key deploy.sh ${{ inputs.ssh_user }}@${{ inputs.ssh_host }}:/tmp/
          ssh -o IdentitiesOnly=yes -i ~/.ssh/deploy_key ${{ inputs.ssh_user }}@${{ inputs.ssh_host }} "bash /tmp/deploy.sh ${{ inputs.app_path }} ${{ inputs.deploy_branch }}"
      
      - name: Health check
        if: inputs.health_check_url != ''
        run: |
          echo "🏥 Running health check..."
          sleep 10
          
          MAX_ATTEMPTS=5
          ATTEMPT=1
          
          while [ $ATTEMPT -le $MAX_ATTEMPTS ]; do
            echo "Attempt $ATTEMPT of $MAX_ATTEMPTS..."
            
            HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" --max-time 60 ${{ inputs.health_check_url }})
            
            if [ $HTTP_CODE -eq 200 ]; then
              echo "✅ Health check passed! (HTTP $HTTP_CODE)"
              exit 0
            fi
            
            if [ $HTTP_CODE -eq 503 ]; then
              echo "⚠️ Site in maintenance mode (HTTP 503) — deploy may have failed"
            else
              echo "⚠️ Health check returned HTTP $HTTP_CODE"
            fi
            
            ATTEMPT=$((ATTEMPT + 1))
            
            if [ $ATTEMPT -le $MAX_ATTEMPTS ]; then
              sleep 15
            fi
          done
          
          echo "❌ Health check failed after $MAX_ATTEMPTS attempts"
          exit 1
      
      - name: Deployment summary
        if: always()
        run: |
          echo "### Deployment Summary 🚀" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- **System**: ${{ inputs.system_type }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Environment**: ${{ inputs.environment }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Branch**: ${{ inputs.deploy_branch }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Host**: ${{ inputs.ssh_host }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Status**: ${{ job.status }}" >> $GITHUB_STEP_SUMMARY
